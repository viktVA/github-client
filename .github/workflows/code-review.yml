name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_diff.txt

      - name: AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          DIFF=$(cat pr_diff.txt | head -c 8000)
          
          python3 << 'EOF'
          import os, json, urllib.request
          
          diff = open("pr_diff.txt").read()[:8000]
          
          payload = json.dumps({
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 1024,
            "messages": [{
              "role": "user",
              "content": f"Сделай code review. Найди баги и проблемы. Отвечай на русском. Diff:\n{diff}"
            }]
          }).encode()
          
          req = urllib.request.Request(
            "https://api.anthropic.com/v1/messages",
            data=payload,
            headers={
              "x-api-key": os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version": "2023-06-01",
              "content-type": "application/json"
            }
          )
          
          with urllib.request.urlopen(req) as r:
            result = json.loads(r.read())
          
          comment = result["content"][0]["text"]
          
          with open("review_comment.txt", "w") as f:
            f.write("## 🤖 AI Code Review\n\n" + comment)
          
          EOF
          
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file review_comment.txt
